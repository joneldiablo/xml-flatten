<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XML Flatten Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/css/tabulator.min.css" rel="stylesheet">
<style>
    .json-preview { font-family: 'Courier New', monospace; font-size: 12px; max-height: 300px; overflow: auto; }
    .tabulator-tableholder { max-height: 500px; }
    details.step-card { transition: all 0.3s; border: 1px solid rgba(0,0,0,0.125); border-radius: 0.375rem; }
    details.step-card[open] { border-color: #198754; box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25); }
    summary { cursor: pointer; padding: 0.5rem 1rem; background: #f8f9fa; font-weight: 500; }
    details.step-card[open] summary { background: #e9ecef; border-bottom: 1px solid rgba(0,0,0,0.125); }
    .card-body { padding: 1rem; }
    .filter-row .form-floating > .form-control, .filter-row .form-floating > .form-select { height: 42px; padding-top: 0.625rem; }
    .filter-row .form-floating > label { font-size: 0.75rem; padding: 0.625rem 0.75rem; }
    .filter-row .btn { margin-bottom: 16px; }
  </style>
</head>
<body>
  <div id="app" class="container-fluid py-4">
    <h1 class="mb-4">XML Flatten Admin</h1>
    
    <div class="row">
      <div class="col-lg-4">
        <details class="card step-card mb-2" :open="step >= 1">
          <summary>1. Input XML</summary>
          <div class="card-body">
            <textarea v-model="xmlInput" class="form-control mb-2" rows="8" placeholder="Paste XML here..."></textarea>
            <button @click="processXml" class="btn btn-primary w-100" :disabled="!xmlInput || loading">
              <span v-if="loading" class="spinner-border spinner-border-sm me-1"></span>
              Process
            </button>
          </div>
        </details>
        
        <details class="card step-card mb-2" :open="step >= 2">
          <summary>2. JSON (Original)</summary>
          <div class="card-body">
            <pre class="json-preview bg-light p-2 rounded" v-if="jsonOriginal">{{ formatJson(jsonOriginal) }}</pre>
            <p v-else class="text-muted">No data yet</p>
          </div>
        </details>
        
        <details class="card step-card mb-2" :open="step >= 3">
          <summary>3. Flattened</summary>
          <div class="card-body">
            <pre class="json-preview bg-light p-2 rounded" v-if="jsonFlattened">{{ formatJson(jsonFlattened) }}</pre>
            <p v-else class="text-muted">No data yet</p>
            <button @click="uploadToDb" class="btn btn-success w-100 mt-2" :disabled="!jsonFlattened || uploading">
              <span v-if="uploading" class="spinner-border spinner-border-sm me-1"></span>
              Upload to DB
            </button>
          </div>
        </details>
      </div>
      
      <div class="col-lg-8">
        <details class="card step-card mb-2" :open="step >= 4">
          <summary class="d-flex justify-content-between align-items-center">
            <span>4. Database Table (Tabulator)</span>
            <button @click="loadData" class="btn btn-sm btn-outline-secondary">&#8635; Reload</button>
          </summary>
          <div class="card-body">
            <div class="filter-row d-flex flex-wrap mb-2 align-items-end">
              <div class="form-floating" style="width: 150px;">
                <input v-model="filters.q" @keyup.enter="applyFilters" id="searchInput" class="form-control" placeholder="Search...">
                <label for="searchInput">Search</label>
              </div>
              
              <div class="form-floating" style="width: 140px;">
                <select v-model="filters.orderBy" @change="applyFilters" id="orderBySelect" class="form-select">
                  <option value="">Order By</option>
                  <option value="created-desc">Newest First</option>
                  <option value="created-asc">Oldest First</option>
                  <option value="uuid-desc">UUID Z-A</option>
                  <option value="uuid-asc">UUID A-Z</option>
                  <option value="path-asc">Path A-Z</option>
                  <option value="path-desc">Path Z-A</option>
                  <option value="type-asc">Type A-Z</option>
                </select>
                <label for="orderBySelect">Order</label>
              </div>
              
              <div class="form-floating" style="width: 120px;">
                <select v-model="filters.column" @change="addColumnFilter" id="columnSelect" class="form-select">
                  <option value="">Column</option>
                  <option value="uuid">UUID</option>
                  <option value="path">Path</option>
                  <option value="value">Value</option>
                  <option value="type">Type</option>
                </select>
                <label for="columnSelect">Filter</label>
              </div>
              
              <div class="form-floating" style="width: 120px;">
                <input v-model="filters.columnValue" @keyup.enter="addColumnFilter" id="colValueInput" class="form-control" placeholder="Value" :disabled="!filters.column">
                <label for="colValueInput">Value</label>
              </div>
              
              <div class="form-floating" style="width: 80px;">
                <input v-model.number="filters.limit" @change="applyFilters" id="limitInput" type="number" class="form-control" placeholder="Rows" min="5" max="200">
                <label for="limitInput">Rows</label>
              </div>
              
              <div class="form-floating" style="width: 60px;">
                <input v-model.number="filters.page" @change="applyFilters" id="pageInput" type="number" class="form-control" placeholder="Pg" min="0">
                <label for="pageInput">Page</label>
              </div>
              
              <button @click="clearFilters" class="btn btn-outline-secondary btn-sm mb-2">Clear</button>
              <button @click="loadData" class="btn btn-outline-primary btn-sm mb-2">Apply</button>
            </div>
            <div v-if="activeColumnFilters.length" class="mb-2">
              <span v-for="(f, i) in activeColumnFilters" :key="i" class="badge bg-secondary me-1">
                {{ f.column }}: {{ f.value }}
                <span @click="removeColumnFilter(i)" style="cursor:pointer;">&times;</span>
              </span>
            </div>
            <div id="data-table"></div>
          </div>
        </details>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3.4.31/dist/vue.global.prod.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tabulator/6.3.1/js/tabulator.min.js"></script>
  <script>
    const { createApp, ref, onMounted, nextTick } = Vue;
    
    createApp({
      setup() {
        const xmlInput = ref('');
        const jsonOriginal = ref(null);
        const jsonFlattened = ref(null);
        const loading = ref(false);
        const uploading = ref(false);
        const step = ref(0);
        let table = null;
        
        const filters = ref({
          q: '',
          orderBy: '',
          column: '',
          columnValue: '',
          limit: 50,
          page: 0
        });
        
        const activeColumnFilters = ref([]);
        
        const processXml = async () => {
          if (!xmlInput.value) return;
          loading.value = true;
          try {
            const res = await fetch('/api/process', {
              method: 'POST',
              headers: { 'Content-Type': 'application/xml' },
              body: xmlInput.value
            });
            const data = await res.json();
            if (data.success) {
              jsonOriginal.value = data.data.document;
              jsonFlattened.value = data.data.flattened;
              step.value = 3;
            } else {
              alert('Error: ' + data.error);
            }
          } catch (e) {
            alert('Error: ' + e.message);
          }
          loading.value = false;
        };
        
        const uploadToDb = async () => {
          if (!jsonFlattened.value) return;
          uploading.value = true;
          try {
            const res = await fetch('/api/process', {
              method: 'POST',
              headers: { 'Content-Type': 'application/xml' },
              body: xmlInput.value
            });
            const data = await res.json();
            if (data.success) {
              await loadData();
              alert('Uploaded successfully!');
            } else {
              alert('Error: ' + data.error);
            }
          } catch (e) {
            alert('Error: ' + e.message);
          }
          uploading.value = false;
        };
        
        const addColumnFilter = async () => {
          if (filters.value.column && filters.value.columnValue) {
            activeColumnFilters.value.push({
              column: filters.value.column,
              value: filters.value.columnValue
            });
            filters.value.column = '';
            filters.value.columnValue = '';
          }
          await applyFilters();
        };
        
        const removeColumnFilter = async (index) => {
          activeColumnFilters.value.splice(index, 1);
          await applyFilters();
        };
        
        const clearFilters = async () => {
          filters.value = { q: '', orderBy: '', column: '', columnValue: '', limit: 50, page: 0 };
          activeColumnFilters.value = [];
          await loadData();
        };
        
        const buildFilterQuery = () => {
          const filterObj = {};
          
          if (filters.value.q) {
            filterObj.q = filters.value.q;
          }
          
          if (activeColumnFilters.value.length > 0) {
            for (const f of activeColumnFilters.value) {
              if (!filterObj.filters) filterObj.filters = {};
              filterObj.filters[f.column] = { $like: f.value };
            }
          }
          
          if (filters.value.orderBy) {
            const [col, dir] = filters.value.orderBy.split('-');
            filterObj.orderBy = { [col]: dir };
          }
          
          if (filters.value.limit) filterObj.limit = filters.value.limit;
          if (filters.value.page) filterObj.page = filters.value.page;
          
          return filterObj;
        };
        
        const loadData = async () => {
          try {
            const filterObj = buildFilterQuery();
            const params = new URLSearchParams();
            if (filterObj.q) params.append('q', filterObj.q);
            if (filterObj.orderBy) params.append('orderBy', JSON.stringify(filterObj.orderBy));
            if (filterObj.limit) params.append('limit', String(filterObj.limit));
            if (filterObj.page !== undefined) params.append('page', String(filterObj.page));
            if (filterObj.filters) params.append('filters', JSON.stringify(filterObj.filters));
            
            const res = await fetch('/api/data?' + params.toString());
            const data = await res.json();
            if (data.success) {
              step.value = 4;
              await nextTick();
              
              let rowIndex = filters.value.page * filters.value.limit + 1;
              const tableData = data.data.map(row => ({
                num: rowIndex++,
                uuid: row.uuid || row.document_uuid,
                path: row.path,
                value: row.value,
                type: row.type,
                created: row.created || row.created_at
              }));
              
              if (table) {
                table.setData(tableData);
              } else {
table = new Tabulator('#data-table', {
                  data: tableData,
                  layout: 'fitColumns',
                  height: '500px',
                  striped: true,
                  columns: [
                    { title: '', field: 'num', width: 45, hozAlign: 'center', headerSort: false, resizable: false, formatter: function(cell) { cell.getElement().style.backgroundColor = '#b0b0b0'; return cell.getValue(); } },
                    { title: 'UUID', field: 'uuid', width: 150, hozAlign: 'left', headerSort: false },
                    { title: 'Path', field: 'path', width: 300, hozAlign: 'left', headerSort: false },
                    { title: 'Value', field: 'value', width: 200, hozAlign: 'left', headerSort: false },
                    { title: 'Type', field: 'type', width: 80, hozAlign: 'center', headerSort: false },
                    { title: 'Created', field: 'created', width: 150, hozAlign: 'left', headerSort: false }
                  ],
                  pagination: false
                });
              }
            }
          } catch (e) {
            console.error('Load error:', e);
          }
        };
        
        const applyFilters = async () => {
          await loadData();
        };
        
        const formatJson = (obj) => {
          return JSON.stringify(obj, null, 2);
        };
        
        onMounted(() => {
          loadData();
        });
        
        return { 
          xmlInput, jsonOriginal, jsonFlattened, loading, uploading, step, 
          processXml, uploadToDb, loadData, formatJson, filters, 
          activeColumnFilters, addColumnFilter, removeColumnFilter, clearFilters, applyFilters 
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
